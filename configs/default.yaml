# CADENCE default configuration
# All parameters are configurable -- no magic numbers in code.

# Pipeline version: "v1" = original, "v2" = doubly-sparse discovery + moderation + nonlinear
pipeline: "v2"

# Data pipeline
session_cache: "C:/Users/optilab/desktop/MCCT/session_cache"
device: cuda

# Basis functions
# Default single band (used for modalities without a specific lag_bands override)
basis:
  layer1:
    n_basis: 8
    max_lag_seconds: 5.0
    min_lag_seconds: 0.0
    log_spacing: true

# Per-modality lag bands (optional — overrides basis.layer1 for specific source modalities)
# Each modality can have multiple bands covering different timescales.
# Bands can have gaps (e.g., skip 5-20s) — no coupling modelled in the gap.
lag_bands:
  # ECG: short sensorimotor lags + long autonomic lags
  # Long band uses fewer basis functions to avoid overparameterization
  # (60s range has strong autocorrelation that surrogates don't fully break)
  ecg_features:
    - n_basis: 8
      min_lag_seconds: 0.0
      max_lag_seconds: 5.0
      log_spacing: true
    - n_basis: 5
      min_lag_seconds: 20.0
      max_lag_seconds: 60.0
      log_spacing: false

# Exponentially Weighted Least Squares solver
ewls:
  tau_seconds: 30.0
  lambda_ridge: 1.0e-3
  eval_rate: 2.0
  min_effective_n: 20

# Per-modality tau overrides (optional — keyed by SOURCE modality)
# Fast-changing modalities (BL, Pose) need shorter tau to track brief coupling episodes.
# Slow modalities (EEG, ECG) use the default tau_seconds above.
ewls_tau_overrides:
  blendshapes: 15.0        # Was 8.0. Longer window for episodic coupling.
  blendshapes_v2: 15.0     # V2 key for same modality
  pose_features: 20.0      # Was 8.0. Postural coupling events 3-12s → need tau > event.

# Per-modality eval rate overrides (keyed by SOURCE modality)
# Controls EWLS temporal resolution per pathway. Default = ewls.eval_rate.
# Higher rate = finer temporal detail but more compute; lower = coarser but cheaper.
eval_rate_overrides:
  eeg_features: 5.0       # 0.2s steps — fast neural transients
  blendshapes: 15.0        # 3x improvement over 5 Hz. Captures 100-300ms facial mimicry.
  blendshapes_v2: 15.0     # V2 key for same modality
  pose_features: 10.0      # Near-native Pose rate (12 Hz) — fixes catastrophic p/T
  ecg_features: 0.0333     # ~30s windows — autonomic timescale

# Autoregressive terms for target signal
autoregressive:
  order: 3
  include: true

# Phase 1 modality-level screening
# Source/target signals reduced via PCA to this many channels
# Keeps predictor count manageable for F-test validity
# Phase 1 PCA channels: per-modality to match effective dimensionality
# Low-dim modalities (EEG 7ch, ECG 6ch): keep all channels
# High-dim modalities (BL 53ch, Pose 41ch): reduce to manageable size
phase1_max_channels:
  eeg_features: 8
  ecg_features: 4
  blendshapes: 4
  pose_features: 6
  # V2 modalities (PCA reduction for surrogate tests on high-dim sources)
  eeg_wavelet: 10
  eeg_interbrain: 10
  ecg_features_v2: 7
  blendshapes_v2: 10

# Pathway discovery (group lasso)
discovery:
  group_lasso_alpha_range: [1.0e-4, 1.0e-1]
  n_folds: 5
  significance_threshold: 0.05

# Feature decomposition (Phase 2: within significant pathways)
decomposition:
  enabled: true
  blendshape_groups: true
  pose_groups: true

# Significance testing
significance:
  f_test_alpha: 0.05
  surrogate:
    n_surrogates: 100
    n_screen_surrogates: 500
    method: circular_shift
    min_shift_frac: 0.1
  # FDR correction across pathways: false (default), or 'bh' for Benjamini-Hochberg.
  # Requires n_screen_surrogates >= 500 with 16 pathways to be practical.
  fdr_correction: bh
  session_level:
    binomial_alpha: 0.01
    ttest_alpha: 0.01
    min_dr2: 0.001

# Layer 3 modulation (deferred until L1+L2 validated)
modulation:
  enabled: false
  moderators: []

# Visualization
visualization:
  figsize: [16, 8]
  dpi: 150

# Sessions
sessions: null  # null = all discovered sessions
excluded_sessions:
  - y26_022728

# ---------------------------------------------------------------------------
# V2 Pipeline Configuration
# ---------------------------------------------------------------------------

# Wavelet parameters (Morlet CWT)
wavelet:
  n_frequencies: 20
  freq_range: [2.0, 45.0]
  n_cycles: 6
  output_hz: 5.0

# Blendshape PCA + derivatives
blendshapes_v2:
  n_pca_components: 15
  derivative_sigma_s: 0.5

# Discovery (Stage 1: group lasso feature selection)
v2_discovery:
  group_lasso_n_lambdas: 20
  lambda_ratio: 0.001           # lambda_min = lambda_max * ratio
  ebic_gamma: 0.5               # EBIC sparsity control (0=BIC, 0.5-1=sparser)
  consistency_min_sessions: 4

# Stage 2 (EWLS on selected features)
stage2:
  moderation:
    enabled: true
    moderators: ["ecg_hr", "ecg_rmssd"]
  nonlinear:
    enabled: true

# Pathway-specific temporal parameters
pathway_temporal:
  mimicry:
    max_lag_seconds: 5.0     # Literature: facial mimicry 0.5-2s, imitation 2-5s
    n_basis: 6               # Fewer basis for shorter lag range → better p/T
  fast:
    max_lag_seconds: 12.0
    n_basis: 10
  medium:
    max_lag_seconds: 18.0
    n_basis: 10
  slow:
    max_lag_seconds: 45.0
    n_basis: 12

# Pathway category assignments (src->tgt -> speed category)
pathway_category:
  eeg_wavelet->blendshapes_v2: fast
  eeg_wavelet->pose_features: medium
  blendshapes_v2->pose_features: mimicry
  blendshapes_v2->blendshapes_v2: mimicry
  pose_features->blendshapes_v2: mimicry
  pose_features->pose_features: medium
  eeg_wavelet->eeg_wavelet: fast
  eeg_interbrain->blendshapes_v2: fast
  eeg_interbrain->pose_features: medium
  eeg_interbrain->ecg_features_v2: slow
  # ECG source pathways: autonomic coupling operates on slow timescales
  ecg_features_v2->eeg_wavelet: slow
  ecg_features_v2->blendshapes_v2: slow
  ecg_features_v2->pose_features: slow
  default: medium

# ---------------------------------------------------------------------------
# Doubly-Sparse Detection (combined strategy for feature + temporal sparsity)
# ---------------------------------------------------------------------------
doubly_sparse:
  enabled: true
  pathway_workers: 3              # concurrent pathway threads in Stage 1 (CUDA stream overlap)
  pregroup:
    enabled: true
    correlation_threshold: 0.8       # merge adjacent freq bins with |rho| > threshold
  prescreen:
    enabled: true
    max_features: 200                # SIS: keep top K (also limited by n_features/2)
  stability_selection:
    enabled: true
    n_subsamples: 50                 # random subsamples for stability
    subsample_fraction: 0.5          # fraction of valid timepoints per subsample
    selection_threshold: 0.6         # min fraction of subsamples to be "stable"
    lambda_fraction: 0.3             # lambda = fraction * lambda_max
    n_lambdas: 5                     # lambda path length per subsample
    lambda_ratio: 0.1                # lambda_min = lambda_max * ratio
  block_selection:
    enabled: true
    block_duration_s: 120.0          # 2-minute blocks
    selection_rate: 0.05             # expected selection rate under null
    binomial_alpha: 0.05             # binomial test significance level
    min_block_samples: 20            # minimum valid samples per block
    block_n_shifts: 20               # circular shifts per block for null calibration
  surrogate_fallback: true           # keep surrogate test as fallback for sustained coupling
